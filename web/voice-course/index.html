<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Vox Voice</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #121826;
      --muted: #657186;
      --line: #dfe5ef;
      --primary: #246bfe;
      --primary-dark: #164cc8;
      --teal: #0f9f8f;
      --coral: #d94f45;
      --soft-blue: #e8f0ff;
      --soft-teal: #e6f7f4;
      --soft-red: #fdecea;
      --shadow: 0 18px 50px rgba(25, 36, 58, 0.12);
      --sans: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      min-height: 100dvh;
      letter-spacing: 0;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .shell {
      width: min(1180px, 100%);
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 310px 1fr;
      gap: 0;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .side {
      border-right: 1px solid var(--line);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      background: #fbfcff;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--soft-blue);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge.live {
      background: var(--soft-teal);
      color: #087669;
    }

    .badge.error {
      background: var(--soft-red);
      color: #a73730;
    }

    .profile {
      display: grid;
      gap: 8px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .profile small,
    .meta small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .profile strong {
      font-size: 15px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .side-actions {
      display: grid;
      gap: 10px;
    }

    .secondary-btn,
    .ghost-btn,
    .icon-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      cursor: pointer;
    }

    .secondary-btn {
      min-height: 42px;
      padding: 0 14px;
      font-weight: 650;
    }

    .ghost-btn {
      min-height: 38px;
      padding: 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .topbar {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 26px;
      border-bottom: 1px solid var(--line);
    }

    .topic {
      min-width: 0;
    }

    .topic h2 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .topic p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .transcript {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 28px 26px 18px;
      background:
        linear-gradient(180deg, rgba(232, 240, 255, 0.48), rgba(255,255,255,0) 260px),
        #fff;
    }

    .turns {
      display: grid;
      gap: 14px;
      max-width: 760px;
      margin: 0 auto;
    }

    .turn {
      display: grid;
      gap: 5px;
      padding: 13px 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .turn.user {
      margin-left: 54px;
      border-color: rgba(15, 159, 143, 0.28);
      background: #fbfffe;
    }

    .turn.assistant {
      margin-right: 54px;
      border-color: rgba(36, 107, 254, 0.24);
      background: #fbfdff;
    }

    .turn.system {
      border-style: dashed;
      background: #fbfcff;
      color: var(--muted);
    }

    .who {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .text {
      margin: 0;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.48;
      overflow-wrap: anywhere;
    }

    .controls {
      border-top: 1px solid var(--line);
      padding: 18px 26px max(18px, env(safe-area-inset-bottom));
      background: #fff;
    }

    .control-inner {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .primary-btn {
      border: 0;
      min-height: 58px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 760;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .primary-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .primary-btn.live {
      background: var(--coral);
    }

    .pulse {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 0 rgba(255,255,255,0.42);
      animation: pulse 1.5s ease-out infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.48); }
      70% { box-shadow: 0 0 0 18px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      align-items: center;
      min-width: 0;
    }

    .login {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(247, 248, 251, 0.92);
      backdrop-filter: blur(18px);
    }

    .login[hidden] { display: none; }

    .login-card {
      width: min(100%, 420px);
      display: grid;
      gap: 18px;
      padding: 26px;
      border-radius: 10px;
      background: #fff;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .login-card h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .login-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .login-actions {
      display: grid;
      gap: 10px;
    }

    .error-text {
      color: #a73730;
      background: var(--soft-red);
      border: 1px solid rgba(217, 79, 69, 0.22);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.42;
      overflow-wrap: anywhere;
    }

    .recordings {
      display: grid;
      gap: 8px;
      margin-top: auto;
    }

    .recordings h3 {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .recording-list {
      display: grid;
      gap: 8px;
      max-height: 230px;
      overflow: auto;
    }

    .recording {
      display: grid;
      gap: 3px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 12px;
      color: var(--muted);
    }

    .recording strong {
      color: var(--ink);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 780px) {
      .shell {
        display: flex;
        flex-direction: column;
        grid-template-columns: 1fr;
        height: 100vh;
        height: 100dvh;
        min-height: 0;
        overflow: hidden;
        box-shadow: none;
      }

      .side {
        flex: 0 0 auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 16px 18px;
        gap: 14px;
      }

      .brand h1 { font-size: 25px; }

      .profile {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .side-actions,
      .recordings {
        display: none;
      }

      .main,
      .shell {
        min-height: 0;
      }

      .main {
        flex: 1 1 auto;
      }

      .topbar {
        min-height: 64px;
        padding: 14px 18px;
      }

      .transcript {
        padding: 20px 18px 12px;
      }

      .turn.user,
      .turn.assistant {
        margin-left: 0;
        margin-right: 0;
      }

      .controls {
        padding: 14px 18px max(14px, env(safe-area-inset-bottom));
      }

      .control-inner {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell" aria-label="Vox voice tutor">
    <aside class="side">
      <div class="brand">
        <h1>Vox</h1>
        <span class="badge" id="statusBadge">Ready</span>
      </div>

      <div class="profile">
        <small>Account</small>
        <strong id="accountLabel">Checking...</strong>
      </div>

      <div class="side-actions">
        <button class="secondary-btn" type="button" id="refreshRecordingsButton">Refresh recordings</button>
        <button class="ghost-btn" type="button" id="signOutButton">Sign out</button>
      </div>

      <section class="recordings" aria-label="Recent recordings">
        <h3>Recent recordings</h3>
        <div class="recording-list" id="recordingList"></div>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topic">
          <h2>Live English practice</h2>
          <p id="sessionLine">Conservative lane · short turns · Chinese rescue when needed</p>
        </div>
        <span class="badge" id="connectionBadge">Idle</span>
      </header>

      <section class="transcript" aria-label="Transcript">
        <div class="turns" id="turns"></div>
      </section>

      <footer class="controls">
        <div class="control-inner">
          <button class="primary-btn" type="button" id="callButton" disabled>
            <span>Start live voice</span>
          </button>
          <div class="meta">
            <small id="recordingState">Recording starts with every session.</small>
            <small id="transportState">WebRTC idle</small>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <section class="login" id="loginPanel" aria-label="Login">
    <div class="login-card">
      <h2>Sign in to Vox</h2>
      <p>Vox keeps each learner's practice history separate before a live session starts.</p>
      <div id="loginError" class="error-text" hidden></div>
      <div class="login-actions">
        <button class="primary-btn" type="button" id="googleButton">Continue with Google</button>
        <button class="secondary-btn" type="button" id="localDevButton" hidden>Continue locally</button>
      </div>
    </div>
  </section>

  <audio id="remoteAudio" autoplay></audio>

  <script>
    const els = {
      loginPanel: document.getElementById("loginPanel"),
      loginError: document.getElementById("loginError"),
      googleButton: document.getElementById("googleButton"),
      localDevButton: document.getElementById("localDevButton"),
      signOutButton: document.getElementById("signOutButton"),
      refreshRecordingsButton: document.getElementById("refreshRecordingsButton"),
      accountLabel: document.getElementById("accountLabel"),
      statusBadge: document.getElementById("statusBadge"),
      connectionBadge: document.getElementById("connectionBadge"),
      callButton: document.getElementById("callButton"),
      turns: document.getElementById("turns"),
      remoteAudio: document.getElementById("remoteAudio"),
      recordingState: document.getElementById("recordingState"),
      transportState: document.getElementById("transportState"),
      recordingList: document.getElementById("recordingList"),
      sessionLine: document.getElementById("sessionLine")
    };

    const state = {
      config: null,
      supabase: null,
      accessToken: "",
      user: null,
      phase: "booting",
      pc: null,
      dc: null,
      stream: null,
      remoteStream: null,
      audioContext: null,
      recordDestination: null,
      micSource: null,
      remoteSource: null,
      recorder: null,
      chunks: [],
      recordedBytes: 0,
      recordingCapReached: false,
      sessionId: "",
      startedAt: "",
      startedMs: 0,
      turns: [],
      assistantDraft: "",
      assistantDraftIndex: null,
      pendingRecording: null,
      authExpiredHandling: false,
      stoppingCall: false,
      stopCallPromise: null,
      recordings: []
    };

    init().catch((error) => showFatal(error.message || String(error)));

    els.googleButton.addEventListener("click", signInWithGoogle);
    els.localDevButton.addEventListener("click", async () => {
      state.user = { email: "dev@local.vox", name: "Local Vox Dev", provider: "dev" };
      state.accessToken = "";
      setPhase("idle");
      renderAuth();
      await refreshRecordings();
    });
    els.signOutButton.addEventListener("click", signOut);
    els.refreshRecordingsButton.addEventListener("click", refreshRecordings);
    els.callButton.addEventListener("click", () => {
      if (state.phase === "live" || state.phase === "connecting") stopCall();
      else startCall();
    });

    async function init() {
      const resp = await fetch("/api/config", { cache: "no-store" });
      if (!resp.ok) throw new Error(`config HTTP ${resp.status}`);
      state.config = await resp.json();

      if (!state.config.auth.required) {
        els.localDevButton.hidden = false;
        els.googleButton.hidden = true;
        state.user = { email: "dev@local.vox", name: "Local Vox Dev", provider: "dev" };
        setPhase("idle");
        renderAuth();
        await refreshRecordings();
        return;
      }

      if (!state.config.auth.configured) {
        showFatal("Supabase is not configured for this deployment.");
        return;
      }

      if (!window.supabase?.createClient) {
        showFatal("Supabase client failed to load.");
        return;
      }

      state.supabase = window.supabase.createClient(
        state.config.auth.supabaseUrl,
        state.config.auth.supabaseAnonKey
      );
      const { data } = await state.supabase.auth.getSession();
      applySupabaseSession(data.session);
      state.supabase.auth.onAuthStateChange(async (_event, session) => {
        applySupabaseSession(session);
        renderAuth();
        if (session) {
          await flushPendingRecording();
          await refreshRecordings();
        } else {
          state.recordings = [];
          renderRecordings();
        }
      });
      setPhase(state.user ? "idle" : "signed_out");
      renderAuth();
      if (state.user) {
        await flushPendingRecording();
        await refreshRecordings();
      }
    }

    async function signInWithGoogle() {
      if (!state.supabase) return;
      clearError();
      const redirectTo = `${location.origin}${location.pathname}`;
      const { error } = await state.supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo }
      });
      if (error) showError(error.message);
    }

    async function signOut() {
      if (state.phase === "live" || state.phase === "connecting") await stopCall();
      if (state.supabase) await state.supabase.auth.signOut();
      state.user = null;
      state.accessToken = "";
      state.recordings = [];
      state.pendingRecording = null;
      setPhase("signed_out");
      renderAuth();
      renderRecordings();
    }

    function applySupabaseSession(session) {
      const previousUserId = state.user?.id || state.user?.email || "";
      state.accessToken = session?.access_token || "";
      const supaUser = session?.user;
      state.user = supaUser ? {
        id: supaUser.id,
        email: supaUser.email,
        name: supaUser.user_metadata?.full_name || supaUser.user_metadata?.name || supaUser.email,
        provider: "supabase"
      } : null;
      const nextUserId = state.user?.id || state.user?.email || "";
      if (state.pendingRecording && previousUserId && nextUserId && previousUserId !== nextUserId) {
        state.pendingRecording = null;
      }
      if (state.user) state.authExpiredHandling = false;
    }

    async function startCall() {
      if (!state.user) return;
      clearError();
      setPhase("connecting");
      state.sessionId = crypto.randomUUID ? crypto.randomUUID() : `session-${Date.now()}`;
      state.startedAt = new Date().toISOString();
      state.startedMs = Date.now();
      state.chunks = [];
      state.recordedBytes = 0;
      state.recordingCapReached = false;
      state.assistantDraft = "";
      state.assistantDraftIndex = null;
      state.turns = [];
      addTurn("system", "Session started. Vox will begin conservatively.");

      try {
        state.stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        startRecorder(state.stream);

        state.pc = new RTCPeerConnection();
        state.pc.ontrack = (event) => {
          state.remoteStream = event.streams[0];
          els.remoteAudio.srcObject = state.remoteStream;
          attachRemoteRecordingStream(state.remoteStream);
        };
        state.pc.oniceconnectionstatechange = () => {
          els.transportState.textContent = `ICE ${state.pc?.iceConnectionState || "closed"}`;
        };
        for (const track of state.stream.getAudioTracks()) {
          state.pc.addTrack(track, state.stream);
        }

        state.dc = state.pc.createDataChannel("oai-events");
        state.dc.onopen = () => {
          els.transportState.textContent = "Data channel open";
          sendEvent({
            type: "response.create",
            response: {
              instructions: "Start the session with one short friendly greeting. Use simple English first, then one brief Chinese rescue sentence."
            }
          });
        };
        state.dc.onmessage = (event) => handleRealtimeEvent(event.data);
        state.dc.onerror = () => {
          els.transportState.textContent = "Data channel error";
        };

        const offer = await state.pc.createOffer();
        await state.pc.setLocalDescription(offer);

        const tokenResp = await fetch("/voice/session", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...authHeaders()
          },
          body: JSON.stringify({ session_id: state.sessionId })
        });
        const tokenPayload = await tokenResp.json().catch(() => ({}));
        if (!tokenResp.ok) {
          throw new Error(tokenPayload.error || `voice session HTTP ${tokenResp.status}`);
        }
        const ephemeralKey = tokenPayload.value || tokenPayload.client_secret?.value;
        if (!ephemeralKey) throw new Error("missing Realtime client secret");

        const sdpResp = await fetch("https://api.openai.com/v1/realtime/calls", {
          method: "POST",
          headers: {
            Authorization: `Bearer ${ephemeralKey}`,
            "Content-Type": "application/sdp"
          },
          body: offer.sdp
        });
        const answerSdp = await sdpResp.text();
        if (!sdpResp.ok) throw new Error(`Realtime SDP HTTP ${sdpResp.status}: ${answerSdp.slice(0, 220)}`);

        await state.pc.setRemoteDescription({ type: "answer", sdp: answerSdp });
        setPhase("live");
      } catch (error) {
        addTurn("system", error.message || String(error));
        await stopCall({ failed: true });
        setPhase("error");
        showError(error.message || String(error));
      }
    }

    function stopCall({ failed = false } = {}) {
      if (state.stopCallPromise) return state.stopCallPromise;
      state.stoppingCall = true;
      state.stopCallPromise = (async () => {
        const wasRecording = Boolean(state.recorder);
        const endedAt = new Date().toISOString();
        let recordingSaved = false;
        let recordingPending = false;
        if (wasRecording) {
          await stopRecorder();
        }
        closePeerConnection();
        stopStream();
        if (wasRecording) {
          try {
            await uploadRecording({ endedAt });
            recordingSaved = true;
          } catch (error) {
            recordingPending = Boolean(state.pendingRecording);
            addTurn("system", error.message || String(error));
            showError(error.message || String(error));
          }
        }
        state.sessionId = "";
        state.startedAt = "";
        state.startedMs = 0;
        if (!state.authExpiredHandling) {
          if (!failed && recordingSaved) {
            addTurn("system", "Session ended. Recording saved.");
          } else if (recordingPending) {
            addTurn("system", "Session ended. Recording is pending sign-in before upload.");
          } else if (!failed && !wasRecording) {
            addTurn("system", "Session ended. No browser audio was captured.");
          }
          setPhase(failed || recordingPending ? "error" : "ended");
          await refreshRecordings();
        }
      })().finally(() => {
        state.stoppingCall = false;
        state.stopCallPromise = null;
      });
      return state.stopCallPromise;
    }

    function closePeerConnection() {
      try { state.dc?.close(); } catch {}
      try { state.pc?.close(); } catch {}
      state.dc = null;
      state.pc = null;
      state.remoteStream = null;
      els.remoteAudio.srcObject = null;
    }

    function stopStream() {
      for (const track of state.stream?.getTracks?.() || []) track.stop();
      state.stream = null;
    }

    function startRecorder(stream) {
      if (!window.MediaRecorder) {
        els.recordingState.textContent = "Recording unavailable in this browser.";
        return;
      }
      const recordingStream = mixedRecordingStream(stream);
      const preferred = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/mp4"
      ].find((type) => MediaRecorder.isTypeSupported(type));
      state.recorder = new MediaRecorder(recordingStream, preferred ? { mimeType: preferred } : undefined);
      state.recorder.ondataavailable = (event) => {
        if (!event.data?.size) return;
        if (state.recordingCapReached) return;
        const maxBytes = maxRecordingBytes();
        if (maxBytes && state.recordedBytes + event.data.size > maxBytes) {
          state.recordingCapReached = true;
          els.recordingState.textContent = "Recording limit reached";
          if (state.phase === "live" || state.phase === "connecting") stopCall();
          return;
        }
        state.recordedBytes += event.data.size;
        state.chunks.push(event.data);
      };
      state.recorder.start(1000);
      els.recordingState.textContent = "Recording";
    }

    function stopRecorder() {
      return new Promise((resolve) => {
        if (!state.recorder) {
          cleanupRecordingGraph();
          resolve();
          return;
        }
        const recorder = state.recorder;
        state.recorder = null;
        recorder.onstop = () => {
          cleanupRecordingGraph();
          resolve();
        };
        if (recorder.state !== "inactive") recorder.stop();
        else {
          cleanupRecordingGraph();
          resolve();
        }
      });
    }

    function mixedRecordingStream(micStream) {
      try {
        state.audioContext = new AudioContext();
        state.recordDestination = state.audioContext.createMediaStreamDestination();
        state.micSource = state.audioContext.createMediaStreamSource(micStream);
        state.micSource.connect(state.recordDestination);
        if (state.remoteStream) attachRemoteRecordingStream(state.remoteStream);
        return state.recordDestination.stream;
      } catch (error) {
        console.warn("Vox recording mix fallback:", error);
        return micStream;
      }
    }

    function attachRemoteRecordingStream(remoteStream) {
      if (!state.audioContext || !state.recordDestination || !remoteStream?.getAudioTracks?.().length) return;
      try {
        state.remoteSource?.disconnect();
        state.remoteSource = state.audioContext.createMediaStreamSource(remoteStream);
        state.remoteSource.connect(state.recordDestination);
      } catch (error) {
        console.warn("Vox remote recording mix failed:", error);
      }
    }

    function cleanupRecordingGraph() {
      try { state.remoteSource?.disconnect(); } catch {}
      try { state.micSource?.disconnect(); } catch {}
      try { state.audioContext?.close(); } catch {}
      state.remoteSource = null;
      state.micSource = null;
      state.recordDestination = null;
      state.audioContext = null;
    }

    async function uploadRecording({ endedAt, pending = null } = {}) {
      const recording = pending || buildRecordingPayload({ endedAt });
      if (!recording) {
        els.recordingState.textContent = "No audio captured";
        return;
      }
      const maxBytes = maxRecordingBytes();
      if (maxBytes && recording.blob.size > maxBytes) {
        els.recordingState.textContent = "Recording is too large";
        throw new Error(`recording exceeds ${formatBytes(maxBytes)} limit`);
      }
      const resp = await fetch("/api/recordings", {
        method: "POST",
        headers: {
          "Content-Type": recording.blob.type || "application/octet-stream",
          "X-Vox-Session-Id": recording.sessionId,
          "X-Vox-Started-At": recording.startedAt,
          "X-Vox-Ended-At": recording.endedAt,
          "X-Vox-Duration-Ms": String(recording.durationMs),
          "X-Vox-Transcript": recording.transcript,
          ...authHeaders()
        },
        body: recording.blob
      });
      const payload = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        if (resp.status === 401) {
          state.pendingRecording = recording;
          els.recordingState.textContent = "Recording pending sign-in";
          handleAuthExpired();
          throw new Error("sign in expired; recording is kept in this browser until you sign in again");
        }
        els.recordingState.textContent = "Recording save failed";
        throw new Error(payload.error || `recording upload HTTP ${resp.status}`);
      }
      if (pending) state.pendingRecording = null;
      els.recordingState.textContent = recording.partial
        ? `Saved partial ${formatBytes(payload.recording.bytes)}`
        : `Saved ${formatBytes(payload.recording.bytes)}`;
    }

    function buildRecordingPayload({ endedAt }) {
      if (!state.chunks.length) return null;
      const mimeType = state.chunks[0].type || "audio/webm";
      return {
        blob: new Blob(state.chunks, { type: mimeType }),
        sessionId: state.sessionId,
        startedAt: state.startedAt,
        endedAt,
        durationMs: state.startedMs ? Date.now() - state.startedMs : "",
        transcript: recordingTranscriptHeader(),
        partial: state.recordingCapReached
      };
    }

    function recordingTranscriptHeader() {
      let turns = state.turns.slice(-40).map((turn) => ({
        role: turn.role,
        text: String(turn.text || "").slice(0, 500)
      }));
      let encoded = encodeURIComponent(JSON.stringify(turns));
      while (encoded.length > 6000 && turns.length > 1) {
        turns = turns.slice(1);
        encoded = encodeURIComponent(JSON.stringify(turns));
      }
      return encoded;
    }

    async function flushPendingRecording() {
      if (!state.pendingRecording || !state.user) return;
      try {
        await uploadRecording({ pending: state.pendingRecording });
      } catch (error) {
        showError(error.message || String(error));
      }
    }

    async function refreshRecordings() {
      if (!state.user) {
        state.recordings = [];
        renderRecordings();
        return;
      }
      const resp = await fetch("/api/recordings", { headers: authHeaders(), cache: "no-store" });
      if (!resp.ok) {
        if (resp.status === 401) {
          handleAuthExpired();
          return;
        }
        state.recordings = [];
        renderRecordings(`Recordings HTTP ${resp.status}`);
        return;
      }
      const payload = await resp.json();
      state.recordings = payload.recordings || [];
      renderRecordings();
    }

    function handleRealtimeEvent(raw) {
      let event;
      try { event = JSON.parse(raw); } catch { return; }
      switch (event.type) {
        case "response.created":
          state.assistantDraft = "";
          state.assistantDraftIndex = null;
          setPhase("live");
          break;
        case "input_audio_buffer.speech_started":
          els.connectionBadge.textContent = "Listening";
          break;
        case "response.output_audio_transcript.delta":
        case "response.audio_transcript.delta":
        case "response.output_text.delta":
          if (event.delta) updateAssistantDraft(event.delta);
          break;
        case "response.output_audio_transcript.done":
        case "response.audio_transcript.done":
        case "response.output_text.done":
          finalizeAssistant(event.transcript || event.text || state.assistantDraft);
          break;
        case "conversation.item.input_audio_transcription.completed":
          if (event.transcript) addTurn("user", event.transcript);
          break;
        case "response.output_item.done":
          if (event.item?.type === "function_call") handleFunctionCall(event.item);
          break;
        case "response.done":
        case "response.output_audio.done":
        case "response.audio.done":
          els.connectionBadge.textContent = state.phase === "live" ? "Live" : labelForPhase(state.phase);
          break;
        case "error":
          addTurn("system", event.error?.message || "Realtime error");
          showError(event.error?.message || "Realtime error");
          break;
        default:
          break;
      }
    }

    async function handleFunctionCall(item) {
      const output = await callBridgeTool(item.name, item.arguments || "{}");
      sendEvent({
        type: "conversation.item.create",
        item: {
          type: "function_call_output",
          call_id: item.call_id,
          output
        }
      });
      sendEvent({ type: "response.create" });
    }

    async function callBridgeTool(name, argsString) {
      try {
        const resp = await fetch("/tool/call", {
          method: "POST",
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify({ name, arguments: argsString })
        });
        if (resp.status === 401) {
          handleAuthExpired();
          return "tool error: sign in expired";
        }
        const payload = await resp.json();
        return payload.output || JSON.stringify(payload);
      } catch (error) {
        return `tool error: ${error.message || String(error)}`;
      }
    }

    function sendEvent(obj) {
      if (state.dc?.readyState !== "open") return;
      state.dc.send(JSON.stringify(obj));
    }

    function updateAssistantDraft(delta) {
      state.assistantDraft += delta;
      const draftIndex = state.assistantDraftIndex;
      const draftTurn = Number.isInteger(draftIndex) ? state.turns[draftIndex] : null;
      if (draftTurn?.role === "assistant" && draftTurn.draft) {
        draftTurn.text = state.assistantDraft;
      } else {
        state.assistantDraftIndex = state.turns.length;
        state.turns.push({ role: "assistant", text: state.assistantDraft, draft: true });
      }
      renderTurns();
    }

    function finalizeAssistant(text) {
      const clean = (text || state.assistantDraft || "").trim();
      const draftIndex = state.assistantDraftIndex;
      const draftTurn = Number.isInteger(draftIndex) ? state.turns[draftIndex] : null;
      if (!clean) {
        if (draftTurn?.role === "assistant" && draftTurn.draft) state.turns.splice(draftIndex, 1);
        state.assistantDraft = "";
        state.assistantDraftIndex = null;
        renderTurns();
        return;
      }
      if (draftTurn?.role === "assistant" && draftTurn.draft) {
        draftTurn.text = clean;
        delete draftTurn.draft;
      } else {
        state.turns.push({ role: "assistant", text: clean });
      }
      state.assistantDraft = "";
      state.assistantDraftIndex = null;
      renderTurns();
    }

    function addTurn(role, text) {
      if (!text) return;
      state.turns.push({ role, text });
      renderTurns();
    }

    function renderTurns() {
      els.turns.innerHTML = state.turns.map((turn) => `
        <article class="turn ${escapeHtml(turn.role)}">
          <div class="who">${turn.role === "user" ? "You" : turn.role === "assistant" ? "Vox" : "System"}</div>
          <p class="text">${escapeHtml(turn.text)}</p>
        </article>
      `).join("");
      requestAnimationFrame(() => {
        const scroller = els.turns.closest(".transcript");
        scroller.scrollTo({ top: scroller.scrollHeight, behavior: "smooth" });
      });
    }

    function renderAuth() {
      const signedIn = Boolean(state.user);
      els.loginPanel.hidden = signedIn;
      els.accountLabel.textContent = signedIn ? (state.user.email || state.user.name || "Signed in") : "Signed out";
      els.signOutButton.hidden = !signedIn || state.user.provider === "dev";
      els.callButton.disabled = !signedIn || state.phase === "signed_out" || state.phase === "booting";
      els.localDevButton.hidden = state.config?.auth?.required !== false;
      renderPhase();
    }

    function renderPhase() {
      const label = labelForPhase(state.phase);
      els.statusBadge.textContent = label;
      els.connectionBadge.textContent = label;
      els.statusBadge.classList.toggle("live", state.phase === "live");
      els.connectionBadge.classList.toggle("live", state.phase === "live");
      els.statusBadge.classList.toggle("error", state.phase === "error");
      els.connectionBadge.classList.toggle("error", state.phase === "error");
      const active = state.phase === "live" || state.phase === "connecting";
      els.callButton.classList.toggle("live", active);
      els.callButton.innerHTML = active ? `<span class="pulse"></span><span>End and save</span>` : `<span>Start live voice</span>`;
      els.callButton.disabled = !state.user || state.phase === "booting";
      if (!active && state.phase !== "ended") {
        els.transportState.textContent = "WebRTC idle";
      }
    }

    function renderRecordings(message = "") {
      if (message) {
        els.recordingList.innerHTML = `<div class="recording"><strong>${escapeHtml(message)}</strong></div>`;
        return;
      }
      if (!state.recordings.length) {
        els.recordingList.innerHTML = `<div class="recording"><strong>No recordings yet</strong><span>Start a session to create one.</span></div>`;
        return;
      }
      els.recordingList.innerHTML = state.recordings.slice(0, 8).map((item) => `
        <div class="recording">
          <strong>${escapeHtml(new Date(item.saved_at || item.ended_at).toLocaleString())}</strong>
          <span>${formatBytes(item.bytes)} · ${escapeHtml(item.mime_type || "audio")}</span>
        </div>
      `).join("");
    }

    function setPhase(phase) {
      state.phase = phase;
      renderPhase();
    }

    function labelForPhase(phase) {
      if (phase === "booting") return "Booting";
      if (phase === "signed_out") return "Sign in";
      if (phase === "connecting") return "Connecting";
      if (phase === "live") return "Live";
      if (phase === "ended") return "Saved";
      if (phase === "error") return "Error";
      return "Ready";
    }

    function authHeaders() {
      return state.accessToken ? { Authorization: `Bearer ${state.accessToken}` } : {};
    }

    function maxRecordingBytes() {
      return Number(state.config?.recordings?.max_bytes || 0);
    }

    function handleAuthExpired() {
      if (state.authExpiredHandling) return;
      state.authExpiredHandling = true;
      const active = (state.phase === "live" || state.phase === "connecting") && !state.stoppingCall;
      if (active) {
        els.recordingState.textContent = "Session expired. Stopping call.";
        stopCall({ failed: true }).finally(showSignedOutAfterExpiry);
        return;
      }
      showSignedOutAfterExpiry();
    }

    function showSignedOutAfterExpiry() {
      state.user = null;
      state.accessToken = "";
      state.recordings = [];
      setPhase("signed_out");
      renderAuth();
      renderRecordings();
      showError("Your Vox session expired. Sign in again before starting voice practice.");
      state.authExpiredHandling = false;
    }

    function showFatal(message) {
      setPhase("error");
      showError(message);
      els.googleButton.disabled = true;
      els.callButton.disabled = true;
      renderAuth();
    }

    function showError(message) {
      els.loginError.hidden = false;
      els.loginError.textContent = message;
    }

    function clearError() {
      els.loginError.hidden = true;
      els.loginError.textContent = "";
    }

    function formatBytes(bytes) {
      const n = Number(bytes || 0);
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1024 / 1024).toFixed(1)} MB`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
