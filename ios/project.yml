name: Vox
options:
  bundleIdPrefix: com.example.vox
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC
    exactVersion: 147.0.0

schemes:
  Vox:
    shared: true
    build:
      targets:
        Vox: all

targets:
  Vox:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: WebRTC
        product: WebRTC
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Vox
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: Vox needs the microphone for live voice conversation practice.
        NSLocalNetworkUsageDescription: Vox needs to reach the Mac mini bridge on the local network for voice session tokens and fixture audio.
        NSBonjourServices:
          - _http._tcp
          - _vox-control._tcp
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLName: com.example.vox
            CFBundleURLSchemes:
              - vox
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.vox
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
